apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-manager-ingress
  namespace: llm-manager
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: llm-manager-tailscale-only@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: llm-manager.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - llm-manager.amer.dev
      secretName: llm-manager-amer-dev-tls
  rules:
    - host: llm-manager.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-manager-ui
                port:
                  number: 80
