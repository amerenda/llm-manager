apiVersion: apps/v1
kind: Deployment
metadata:
  name: piper-agent
  namespace: llm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: piper-agent
  template:
    metadata:
      labels:
        app: piper-agent
    spec:
      nodeSelector:
        rpi5-host: "true"
      initContainers:
        - name: download-voice
          image: curlimages/curl:latest
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              VOICE=en_US-lessac-medium
              if [ ! -f /voices/${VOICE}.onnx ]; then
                echo "Downloading ${VOICE}..."
                curl -L -o /voices/${VOICE}.onnx \
                  https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/${VOICE}.onnx
                curl -L -o /voices/${VOICE}.onnx.json \
                  https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/${VOICE}.onnx.json
              fi
          volumeMounts:
            - name: voices
              mountPath: /voices
      containers:
        - name: piper-agent
          image: amerenda/llm-manager:piper-41ea30bee108ee30c70e414c4a42ff907a4dcebd
          ports:
            - containerPort: 8091
          env:
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
            - name: BACKEND_URL
              value: "https://llm-manager-backend.amer.dev"
            - name: PIPER_DEFAULT_VOICE
              value: "en_US-lessac-medium"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: voices
              mountPath: /voices
      volumes:
        - name: voices
          persistentVolumeClaim:
            claimName: piper-voices
