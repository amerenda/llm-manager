---
# Create a Bitwarden secure note with these fields:
#   postgres-password: <random password>
#   postgres-url: postgresql://llm:<password>@postgres:5432/llmmanager
# Then set the secret ID below.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: llm-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
  data:
    - secretKey: postgres-password
      remoteRef:
        key: BITWARDEN_LLM_POSTGRES_SECRET_ID
        property: postgres-password
    - secretKey: postgres-url
      remoteRef:
        key: BITWARDEN_LLM_POSTGRES_SECRET_ID
        property: postgres-url
