apiVersion: v1
kind: Service
metadata:
  name: llm-manager-backend
  namespace: llm-manager
  labels:
    app: llm-manager-backend
spec:
  # ClusterIP service — DaemonSet pods are on hostNetwork so endpoints
  # are the node IPs. Other cluster pods reach the backend via this service.
  selector:
    app: llm-manager-backend
  ports:
    - name: http
      port: 8081
      targetPort: 8081
