apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: llm-manager-backend
  namespace: llm-manager
spec:
  selector:
    matchLabels:
      app: llm-manager-backend
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: llm-manager-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      # Only run on nodes with a GPU (label: gpu=true)
      # Label a node: kubectl label node <name> gpu=true
      nodeSelector:
        gpu: "true"

      # Share host network so the pod can reach:
      #   localhost:8090 — llm-agent (docker compose, GPU host)
      #   localhost:11434 — Ollama
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      containers:
        - name: backend
          image: amerenda/llm-manager:backend-54227f1ba20519b6e0bbb396096e5ac8c7f92711
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              hostPort: 8081
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-url
            - name: AGENT_URL
              value: "http://localhost:8090"
            - name: OLLAMA_BASE_URL
              value: "http://localhost:11434"
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
            - name: moltbook-project
              mountPath: /moltbook
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: moltbook-project
          hostPath:
            path: /home/alex/claude/projects/moltbook
            type: Directory
        - name: data
          hostPath:
            path: /var/lib/llm-manager/data
            type: DirectoryOrCreate
