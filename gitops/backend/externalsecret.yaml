apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-psk
  namespace: llm-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: agent-psk
    creationPolicy: Owner
  data:
    - secretKey: psk
      remoteRef:
        key: llm-manager-agent-psk
        property: password
