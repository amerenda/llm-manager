apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llm-manager-backend
  namespace: llm-manager
  labels:
    # kube-prometheus-stack discovers ServiceMonitors with this label
    release: infra-monitoring
spec:
  selector:
    matchLabels:
      app: llm-manager-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
