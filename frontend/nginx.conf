server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy auth endpoints to the backend
    location /auth/ {
        proxy_pass http://llm-manager-backend:8081/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API calls to the llm-manager backend
    location /api/ {
        proxy_pass http://llm-manager-backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy OpenAI-compat endpoints
    location /v1/ {
        proxy_pass http://llm-manager-backend:8081/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Never cache index.html so the browser always gets the latest asset hashes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
