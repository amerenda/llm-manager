name: Build and Push

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: amerenda/llm-manager
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  test:
    name: Run Tests
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          cd backend
          pip3 install -r requirements.txt -r requirements-test.txt
      - name: Run tests
        run: |
          cd backend
          python3 -m pytest test_backend.py test_queue.py -v

  build:
    name: Build and Push
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:backend-${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:backend-latest

      - name: Build and push UI
        uses: docker/build-push-action@v6
        with:
          context: ui
          file: ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:ui-${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:ui-latest

      - name: Raise PR to gitops
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREFIX: ${{ steps.tag.outputs.pr_prefix }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          BRANCH="${PREFIX}/llm-manager-${TAG}"
          git checkout -b "${BRANCH}"

          sed -i "s|amerenda/llm-manager:backend-[^ ]*|amerenda/llm-manager:backend-${TAG}|g" \
            apps/llm-manager/backend/deployment.yaml
          sed -i "s|amerenda/llm-manager:ui-[^ ]*|amerenda/llm-manager:ui-${TAG}|g" \
            apps/llm-manager/ui/deployment.yaml

          git config user.name "claude-automation"
          git config user.email "claude-automation@amerenda.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: llm-manager ${TAG}"
          git push origin "${BRANCH}"

          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "{
              \"title\": \"${PREFIX}: llm-manager ${TAG}\",
              \"body\": \"Auto-generated by llm-manager CI.\\n\\nImages:\\n- \`amerenda/llm-manager:backend-${TAG}\`\\n- \`amerenda/llm-manager:ui-${TAG}\`\\n\\nSource: https://github.com/amerenda/llm-manager/commit/${GITHUB_SHA}\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"


  notify-failure:
    if: failure()
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue for build failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI failed: ${{ github.workflow }}" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure" || echo "Could not create issue"
