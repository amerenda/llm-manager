name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: amerenda/llm-manager
  UI_IMAGE: amerenda/llm-manager

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set SHA
        id: sha
        run: echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:backend-${{ steps.sha.outputs.SHA }}
            ${{ env.BACKEND_IMAGE }}:backend-latest
          cache-from: type=gha,scope=llm-backend
          cache-to: type=gha,mode=max,scope=llm-backend

      - name: Build and push UI
        uses: docker/build-push-action@v6
        with:
          context: ui
          file: ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.UI_IMAGE }}:ui-${{ steps.sha.outputs.SHA }}
            ${{ env.UI_IMAGE }}:ui-latest
          cache-from: type=gha,scope=llm-ui
          cache-to: type=gha,mode=max,scope=llm-ui

      - name: Update image tags in gitops manifests
        run: |
          SHA="${{ steps.sha.outputs.SHA }}"
          sed -i "s|${{ env.BACKEND_IMAGE }}:backend-[^[:space:]]*|${{ env.BACKEND_IMAGE }}:backend-${SHA}|g" \
            gitops/backend/deployment.yaml
          sed -i "s|${{ env.UI_IMAGE }}:ui-[^[:space:]]*|${{ env.UI_IMAGE }}:ui-${SHA}|g" \
            gitops/ui/deployment.yaml

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/backend/deployment.yaml gitops/ui/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update llm-manager to ${{ steps.sha.outputs.SHA }}"
          git push
