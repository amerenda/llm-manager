name: Build and Push

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: amerenda/llm-manager
  GITOPS_REPO: amerenda/k3s-dean-gitops

jobs:
  changes:
    name: Detect changes
    runs-on: arc-runner-set
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect changed components
        id: filter
        run: |
          # On workflow_dispatch or tags, build everything
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "agent=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          check() {
            echo "$CHANGED" | grep -qE "$1" && echo "true" || echo "false"
          }
          echo "backend=$(check '^backend/')" >> "$GITHUB_OUTPUT"
          echo "frontend=$(check '^frontend/')" >> "$GITHUB_OUTPUT"
          # Agent builds only when code/deps change, not for config files like compose.yaml or install.sh
          echo "agent=$(check '^agent/(Dockerfile|main\.py|requirements)')" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  test:
    name: Run Tests
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: [self-hosted, mac-mini]
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          cd backend
          python3 -m venv .venv
          .venv/bin/pip install -q -r requirements.txt -r requirements-test.txt
      - name: Run tests
        run: |
          cd backend
          .venv/bin/python -m pytest test_backend.py test_queue.py -v

  set-tag:
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      pr_prefix: ${{ steps.tag.outputs.pr_prefix }}
    steps:
      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/release/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release/}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=release" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=deploy" >> "$GITHUB_OUTPUT"
          fi

  build-amd64:
    name: Build amd64
    needs: [changes, test, set-tag]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.set-tag.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.agent == 'true')
    runs-on: arc-runner-set
    env:
      TAG: ${{ needs.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push backend (amd64)
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t "${IMAGE}:backend-${TAG}-amd64" -f backend/Dockerfile .
          docker push "${IMAGE}:backend-${TAG}-amd64"

      - name: Build and push frontend (amd64)
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -t "${IMAGE}:frontend-${TAG}-amd64" -f frontend/Dockerfile frontend
          docker push "${IMAGE}:frontend-${TAG}-amd64"

      - name: Build and push agent (amd64)
        if: needs.changes.outputs.agent == 'true'
        run: |
          docker build --build-arg AGENT_VERSION="${TAG}" -t "${IMAGE}:agent-${TAG}-amd64" -f agent/Dockerfile agent
          docker push "${IMAGE}:agent-${TAG}-amd64"

      - name: Build and push agent-amd (amd64 only)
        if: needs.changes.outputs.agent == 'true'
        run: |
          docker build --build-arg AGENT_VERSION="${TAG}" -t "${IMAGE}:agent-amd-${TAG}" -t "${IMAGE}:agent-amd-latest" -f agent/Dockerfile.amd agent
          docker push "${IMAGE}:agent-amd-${TAG}"
          docker push "${IMAGE}:agent-amd-latest"

  build-arm64:
    name: Build arm64
    needs: [changes, test, set-tag]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.set-tag.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.agent == 'true')
    runs-on: [self-hosted, mac-mini]
    env:
      TAG: ${{ needs.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build and push backend (arm64)
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t "${IMAGE}:backend-${TAG}-arm64" -f backend/Dockerfile .
          docker push "${IMAGE}:backend-${TAG}-arm64"

      - name: Build and push frontend (arm64)
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -t "${IMAGE}:frontend-${TAG}-arm64" -f frontend/Dockerfile frontend
          docker push "${IMAGE}:frontend-${TAG}-arm64"

      - name: Build and push agent (arm64)
        if: needs.changes.outputs.agent == 'true'
        run: |
          docker build --build-arg AGENT_VERSION="${TAG}" -t "${IMAGE}:agent-${TAG}-arm64" -f agent/Dockerfile agent
          docker push "${IMAGE}:agent-${TAG}-arm64"

  manifest:
    needs: [changes, set-tag, build-amd64, build-arm64]
    if: |
      always() &&
      needs.build-amd64.result == 'success' &&
      needs.build-arm64.result == 'success'
    runs-on: arc-runner-set
    env:
      TAG: ${{ needs.set-tag.outputs.tag }}
    steps:
      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Create multi-arch manifests
        run: |
          for COMPONENT in backend frontend agent; do
            # Only create manifest if this component was built
            case "$COMPONENT" in
              backend)  [[ "${{ needs.changes.outputs.backend }}" != "true" ]] && continue ;;
              frontend) [[ "${{ needs.changes.outputs.frontend }}" != "true" ]] && continue ;;
              agent)    [[ "${{ needs.changes.outputs.agent }}" != "true" ]] && continue ;;
            esac

            docker buildx imagetools create -t "${IMAGE}:${COMPONENT}-${TAG}" \
              "${IMAGE}:${COMPONENT}-${TAG}-amd64" \
              "${IMAGE}:${COMPONENT}-${TAG}-arm64"

            docker buildx imagetools create -t "${IMAGE}:${COMPONENT}-latest" \
              "${IMAGE}:${COMPONENT}-${TAG}-amd64" \
              "${IMAGE}:${COMPONENT}-${TAG}-arm64"
          done

  deploy:
    needs: [changes, set-tag, manifest]
    if: |
      always() &&
      needs.manifest.result == 'success' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Create deploy PR (UAT + prod)
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
          PREFIX: ${{ needs.set-tag.outputs.pr_prefix }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
        run: |
          rm -rf /tmp/gitops
          git clone https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git /tmp/gitops
          cd /tmp/gitops

          # Close any existing llm-manager deploy PRs to avoid ApplicationSet conflicts
          EXISTING_PRS=$(curl -s \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls?state=open&per_page=100" \
            | python3 -c "
          import json,sys
          for pr in json.load(sys.stdin):
              ref = pr.get('head',{}).get('ref','')
              if ref.startswith('deploy/llm-manager-') or ref.startswith('release/llm-manager-'):
                  print(pr['number'])
          " 2>/dev/null || true)
          for PR_NUM in $EXISTING_PRS; do
            echo "Closing superseded PR #${PR_NUM}"
            curl -s -X PATCH \
              -H "Authorization: token ${GITOPS_PAT}" \
              "https://api.github.com/repos/${GITOPS_REPO}/pulls/${PR_NUM}" \
              -d '{"state":"closed"}' > /dev/null
          done

          BRANCH="${PREFIX}/llm-manager-${TAG}"
          git checkout -b "${BRANCH}"

          # Only update manifests for components that were rebuilt
          if [[ "$BACKEND_CHANGED" == "true" ]]; then
            sed -i "s|amerenda/llm-manager:backend-[^ ]*|amerenda/llm-manager:backend-${TAG}|g" \
              apps/llm-manager/backend-uat/deployment.yaml \
              apps/llm-manager/backend/deployment.yaml
          fi
          if [[ "$FRONTEND_CHANGED" == "true" ]]; then
            sed -i "s|amerenda/llm-manager:frontend-[^ ]*|amerenda/llm-manager:frontend-${TAG}|g" \
              apps/llm-manager/frontend-uat/deployment.yaml \
              apps/llm-manager/frontend/deployment.yaml
          fi

          git config user.name "amerenda-deploy-bot[bot]"
          git config user.email "3192609+amerenda-deploy-bot[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "${PREFIX}: llm-manager ${TAG}"
          git push origin "${BRANCH}"

          # Get source commit message for the PR body
          COMMIT_MSG=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%s' 2>/dev/null || echo "")
          COMMIT_BODY=$(git -C "${GITHUB_WORKSPACE}" log -1 --format='%b' 2>/dev/null | head -5 || echo "")
          NL=$'\n'
          PR_BODY="**llm-manager ${TAG}**${NL}${NL}${COMMIT_MSG}"
          if [ -n "${COMMIT_BODY}" ]; then
            PR_BODY="${PR_BODY}${NL}${NL}${COMMIT_BODY}"
          fi
          PR_BODY="${PR_BODY}${NL}${NL}Images: \`amerenda/llm-manager:backend-${TAG}\`, \`amerenda/llm-manager:frontend-${TAG}\`, \`amerenda/llm-manager:agent-${TAG}\` (multi-arch: amd64+arm64)${NL}Source: https://github.com/amerenda/llm-manager/commit/${GITHUB_SHA}"

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITOPS_REPO}/pulls" \
            -d "$(jq -n \
              --arg title "${PREFIX}: llm-manager ${TAG}" \
              --arg body "${PR_BODY}" \
              --arg head "${BRANCH}" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}')")

          # Add label so ApplicationSet only creates llm-manager UAT apps
          PR_NUMBER=$(echo "$PR_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['number'])")
          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/issues/${PR_NUMBER}/labels" \
            -d '["deploy:llm-manager"]'

          # Assign Alex so he gets a phone notification
          curl -s -X POST \
            -H "Authorization: token ${GITOPS_PAT}" \
            "https://api.github.com/repos/${GITOPS_REPO}/issues/${PR_NUMBER}/assignees" \
            -d '{"assignees":["amerenda"]}'


  notify-agents:
    name: Signal agent update
    needs: [changes, set-tag, manifest]
    if: |
      always() &&
      needs.manifest.result == 'success' &&
      needs.changes.outputs.agent == 'true'
    runs-on: arc-runner-set
    steps:
      - name: Set target version on llm-manager
        env:
          TAG: ${{ needs.set-tag.outputs.tag }}
        run: |
          # Tell llm-manager backend about the new agent version
          # Agents will pick this up on their next heartbeat and self-update
          # Try internal k8s service first, fall back to external URL
          curl -sf -X PUT \
            "http://llm-manager-backend.llm-manager.svc.cluster.local:8081/api/runners/target-version" \
            -H "Content-Type: application/json" \
            -d "{\"target_version\": \"${TAG}\"}" \
            && echo "Agent target version set to ${TAG}" \
            || curl -sf -X PUT \
              "https://llm-manager-backend.amer.dev/api/runners/target-version" \
              -H "Content-Type: application/json" \
              -d "{\"target_version\": \"${TAG}\"}" \
              && echo "Agent target version set to ${TAG} (via external URL)" \
              || echo "Warning: could not set agent target version"

  notify-failure:
    if: failure()
    needs: [changes, test, build-amd64, build-arm64, manifest, deploy, notify-agents]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue for build failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI failed: ${{ github.workflow }}" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure" || echo "Could not create issue"
