name: Reset UAT Database

# Trigger from murderbot or any machine with kubectl:
#   kubectl delete job uat-db-reset -n llm-manager --ignore-not-found
#   kubectl apply -f https://raw.githubusercontent.com/amerenda/k3s-dean-gitops/main/apps/llm-manager/backend-uat/jobs/reset-db-job.yaml
#   kubectl wait --for=condition=complete job/uat-db-reset -n llm-manager --timeout=120s
#   kubectl rollout restart deployment/llm-manager-backend-uat -n llm-manager

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset" to confirm'
        required: true

jobs:
  reset:
    name: Reset UAT DB
    runs-on: arc-runner-set
    container:
      image: bitnami/kubectl:latest
    if: github.event.inputs.confirm == 'reset'
    steps:
      - name: Delete previous job if exists
        run: kubectl delete job uat-db-reset -n llm-manager --ignore-not-found

      - name: Create reset job from manifest
        run: kubectl apply -f https://raw.githubusercontent.com/amerenda/k3s-dean-gitops/main/apps/llm-manager/backend-uat/jobs/reset-db-job.yaml

      - name: Wait for job to complete
        run: kubectl wait --for=condition=complete job/uat-db-reset -n llm-manager --timeout=120s

      - name: Show job logs
        if: always()
        run: kubectl logs job/uat-db-reset -n llm-manager -c reset --tail=30 2>/dev/null || echo "No logs available"

      - name: Restart UAT backend
        run: kubectl rollout restart deployment/llm-manager-backend-uat -n llm-manager
