server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the llm-manager backend
    location /api/ {
        proxy_pass http://llm-manager-backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy OpenAI-compat endpoints
    location /v1/ {
        proxy_pass http://llm-manager-backend:8081/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
