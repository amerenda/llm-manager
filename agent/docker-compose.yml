services:
  llm-agent:
    build: .
    container_name: llm-agent
    # host networking: agent binds directly on the host's IP/port 8090,
    # and IP auto-detection in main.py correctly returns the host's LAN IP.
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /opt/models:/opt/models:ro
      - /home/alex/claude/projects/image/outputs:/outputs:ro
    environment:
      - OLLAMA_URL=http://localhost:11434
      - COMFYUI_URL=http://localhost:8188
      - COMFYUI_OUTPUT_DIR=/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
