# llm-agent + Ollama — GPU monitoring and LLM inference on a host.
#
# Every profile includes the Ollama container (managed mode). Host-managed
# Ollama is no longer supported: tunables are edited in the UI, which
# requires the agent to control the container lifecycle.
#
# Profiles:
#   nvidia  / nvidia-full — llm-agent + Ollama (CUDA)
#   amd     / amd-full    — llm-agent-amd + Ollama-ROCm
#   (the -full aliases exist for compat with existing .env files)
#
# install.sh picks the right profile. Direct usage:
#   docker compose --profile nvidia up -d
#
# Env:
#   .env         — agent credentials + paths (PSK, BACKEND_URL, COMPOSE_DIR, OLLAMA_MODELS_PATH, HSA_OVERRIDE_GFX_VERSION)
#   ollama.env   — Ollama runtime tunables the UI edits (NUM_CTX, FLASH_ATTENTION, KV_CACHE_TYPE, ...)

services:
  llm-agent:
    profiles: ["nvidia", "nvidia-full"]
    image: amerenda/llm-manager:agent-${AGENT_IMAGE_TAG:-latest}
    container_name: llm-agent
    network_mode: host
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_URL: http://localhost:11434
      OLLAMA_CONTAINER: ${OLLAMA_CONTAINER:-ollama}
      OLLAMA_MODELS: /hostfs${OLLAMA_MODELS_PATH:-/opt/ollama/models}
      MODEL_STORAGE_PATH: ${MODEL_STORAGE_PATH:-/opt/ollama/models}
      COMPOSE_DIR: ${COMPOSE_DIR:-}
      COMPOSE_DIR_LOCAL: /host-compose
      COMPOSE_PROFILE: ${COMPOSE_PROFILE:-nvidia-full}
    volumes:
      - agent-tls:/data/tls
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/hostfs:ro
      - ${COMPOSE_DIR:-.}:/host-compose
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llm-agent-amd:
    profiles: ["amd", "amd-full"]
    image: amerenda/llm-manager:agent-amd-${AGENT_IMAGE_TAG:-latest}
    container_name: llm-agent
    network_mode: host
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_URL: http://localhost:11434
      OLLAMA_CONTAINER: ${OLLAMA_CONTAINER:-ollama}
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-}
      OLLAMA_MODELS: /hostfs${OLLAMA_MODELS_PATH:-/opt/ollama/models}
      MODEL_STORAGE_PATH: ${MODEL_STORAGE_PATH:-/opt/ollama/models}
      COMPOSE_DIR: ${COMPOSE_DIR:-}
      COMPOSE_DIR_LOCAL: /host-compose
      COMPOSE_PROFILE: ${COMPOSE_PROFILE:-amd-full}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    volumes:
      - agent-tls:/data/tls
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys:/sys:ro
      - /:/hostfs:ro
      - ${COMPOSE_DIR:-.}:/host-compose

  # ── Docker-managed Ollama ────────────────────────────────────────────────
  # Included in every nvidia/amd profile. Tunables come from ollama.env so
  # the agent can rewrite them (via UI edits) without touching agent
  # credentials in .env, then recreate the container to apply.

  ollama:
    profiles: ["nvidia", "nvidia-full"]
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-0.21.0}
    container_name: ollama
    network_mode: host
    restart: unless-stopped
    env_file:
      - path: ollama.env
        required: false
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-127.0.0.1:11434}
    volumes:
      - ${OLLAMA_MODELS_PATH:-/opt/ollama/models}:/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-amd:
    profiles: ["amd", "amd-full"]
    image: ollama/ollama:${OLLAMA_AMD_IMAGE_TAG:-0.21.0-rocm}
    container_name: ollama
    network_mode: host
    restart: unless-stopped
    env_file:
      - path: ollama.env
        required: false
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-127.0.0.1:11434}
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    # Numeric GIDs from the host — the ollama/ollama:*-rocm image doesn't
    # define a `render` group in /etc/group, so passing names fails on
    # distros where the agent container isn't involved (Arch, etc.). GIDs
    # are resolved directly by the kernel against host device perms.
    # install.sh detects the host GIDs and writes them to .env.
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-107}"
    volumes:
      - ${OLLAMA_MODELS_PATH:-/opt/ollama/models}:/root/.ollama/models

volumes:
  agent-tls:
